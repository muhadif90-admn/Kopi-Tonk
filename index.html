<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  header { padding:48px 20px 32px; text-align:center; border-bottom:1px solid #3a2f24; }

  .card .nama { font-weight:700; font-size:17px; }
  .card .desc { color:#a89880; font-size:13px; margin:2px 0 6px; }
  .card .harga { color:#c79a5b; font-weight:700; }
  .btn-add { background:#c79a5b; color:#1a1410; border:none; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; white-space:nowrap; }

  .bar-inner { max-width:760px; margin:0 auto; display:flex; gap:12px; align-items:center; }

  .sheet { background:#1a1410; border-top:1px solid #3a2f24; border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:24px; }

  .sheet-head h2 { font-size:22px; font-weight:800; }

  .opt-row { display:flex; gap:8px; margin-bottom:16px; }

  .line-opt { color:#a89880; font-size:13px; margin:2px 0 8px; }

  .qty-num { min-width:18px; text-align:center; font-weight:700; }

const MENU = [
  { id:"gula-aren", nama:"Kopi Susu Gula Aren", harga:15000, desc:"Espresso, susu segar, gula aren cair. Signature.", img:IMG_AREN },
  { id:"americano", nama:"Iced Americano", harga:12000, desc:"Espresso shot, air, es batu. Pahit jujur.", img:IMG_AME },
];
const SUGAR = ["Less sugar","Normal sugar","Extra sugar"];
const ICE = ["Less ice","Normal ice","Extra ice"];

let cart = [];
let picker = null, sugarSel = "Normal sugar", iceSel = "Normal ice";
let tipe = "Ambil di tempat";

const rupiah = n => "Rp " + n.toLocaleString("id-ID");
const uid = () => Math.random().toString(36).slice(2,9);
const find = id => MENU.find(m => m.id === id);

function renderMenu(){
  document.getElementById("menu").innerHTML = MENU.map(m => `
    <div class="card">
      <img src="${m.img}" alt="${m.nama}">
      <div class="info">
        <div class="nama">${m.nama}</div>
        <div class="desc">${m.desc}</div>
        <div class="harga">${rupiah(m.harga)}</div>
      </div>
      <button class="btn-add" onclick="openPicker('${m.id}')">+ Tambah</button>
    </div>`).join("");
}

function openPicker(id){
  picker = find(id); sugarSel = "Normal sugar"; iceSel = "Normal ice";
  renderPicker();
  document.getElementById("pickerOverlay").classList.add("show");
}
function closePicker(){ document.getElementById("pickerOverlay").classList.remove("show"); }

function renderPicker(){
  const opt = (arr,sel,fn) => arr.map(o=>`<button class="chip ${o===sel?'active':''}" onclick="${fn}('${o}')">${o}</button>`).join("");
  document.getElementById("pickerSheet").innerHTML = `
    <img class="picker-img" src="${picker.img}" alt="${picker.nama}">
    <div class="sheet-head"><h2 style="font-size:20px">${picker.nama}</h2>
      <button class="btn-step" onclick="closePicker()">&times;</button></div>
    <div style="color:#c79a5b;font-weight:700;margin-bottom:18px">${rupiah(picker.harga)}</div>
    <div class="opt-label">Gula</div><div class="opt-row">${opt(SUGAR,sugarSel,'setSugar')}</div>
    <div class="opt-label">Es</div><div class="opt-row">${opt(ICE,iceSel,'setIce')}</div>
    <button class="cta" onclick="confirmAdd()">Tambah ke pesanan</button>`;
}
function setSugar(v){ sugarSel=v; renderPicker(); }
function setIce(v){ iceSel=v; renderPicker(); }

function confirmAdd(){
  const ex = cart.find(l=>l.id===picker.id && l.sugar===sugarSel && l.ice===iceSel);
  if(ex) ex.qty++; else cart.push({key:uid(), id:picker.id, sugar:sugarSel, ice:iceSel, qty:1});
  closePicker(); renderBar();
}
function step(key,d){
  const l = cart.find(x=>x.key===key); if(!l) return;
  l.qty += d; cart = cart.filter(x=>x.qty>0);
  renderBar(); renderCart();
}

function totals(){
  let total=0,qty=0;
  cart.forEach(l=>{ const m=find(l.id); total+=m.harga*l.qty; qty+=l.qty; });
  return {total,qty};
}
function renderBar(){
  const {total,qty} = totals();
  document.getElementById("bar").classList.toggle("show", qty>0);
  document.getElementById("barQty").textContent = qty+" item";
  document.getElementById("barTotal").textContent = rupiah(total);
}

function openCart(){ renderCart(); document.getElementById("cartOverlay").classList.add("show"); }
function closeCart(){ document.getElementById("cartOverlay").classList.remove("show"); }
function setTipe(t){ tipe=t; renderCart(); }

function renderCart(){
  const {total} = totals();
  const lines = cart.map(l=>{ const m=find(l.id); return `
    <div class="line">
      <div class="line-top"><span>${m.nama}</span><span>${rupiah(m.harga*l.qty)}</span></div>
      <div class="line-opt">${l.sugar} &middot; ${l.ice}</div>
      <div class="qty-row">
        <button class="btn-step" onclick="step('${l.key}',-1)">&minus;</button>
        <span class="qty-num">${l.qty}</span>
        <button class="btn-step" onclick="step('${l.key}',1)">+</button>
      </div>
    </div>`; }).join("");

  document.getElementById("cartSheet").innerHTML = `
    <div class="sheet-head"><h2>Pesanan kamu</h2>
      <button class="btn-step" onclick="closeCart()">&times;</button></div>
    ${lines || '<p style="color:#a89880">Belum ada pesanan.</p>'}
    <div class="total-row"><span>Total</span><span>${rupiah(total)}</span></div>
    <input id="fNama" placeholder="Nama kamu">
    <div class="type-row">
      <button class="chip ${tipe==='Ambil di tempat'?'active':''}" onclick="setTipe('Ambil di tempat')">Ambil di tempat</button>
      <button class="chip ${tipe==='Diantar'?'active':''}" onclick="setTipe('Diantar')">Diantar</button>
    </div>
    ${tipe==='Diantar'?'<textarea id="fAlamat" placeholder="Alamat pengiriman"></textarea>':''}
    <input id="fCatatan" placeholder="Catatan tambahan (opsional)">
    <button class="btn-wa" onclick="kirimWA()">Pesan via WhatsApp</button>
    <p class="note">Pesanan dikirim ke WhatsApp toko untuk dikonfirmasi & bayar.</p>`;
}

function kirimWA(){
  const nama = (document.getElementById("fNama")||{}).value || "";
  const alamatEl = document.getElementById("fAlamat");
  const alamat = alamatEl ? alamatEl.value : "";
  const catatan = (document.getElementById("fCatatan")||{}).value || "";
  if(!nama.trim()){ alert("Isi nama dulu ya."); return; }
  if(tipe==="Diantar" && !alamat.trim()){ alert("Isi alamat pengiriman ya."); return; }
  if(cart.length===0){ alert("Pesanannya masih kosong."); return; }

  const {total} = totals();
  let pesan = `Halo *${NAMA_TOKO}*! Mau pesan:%0A%0A`;
  cart.forEach(l=>{ const m=find(l.id);
    pesan += `\u2022 ${m.nama} x${l.qty} \u2014 ${rupiah(m.harga*l.qty)}%0A`;
    pesan += `   (${l.sugar}, ${l.ice})%0A`;
  });
  pesan += `%0A*Total: ${rupiah(total)}*%0A%0A`;
  pesan += `Nama: ${nama}%0A`;
  pesan += `Tipe: ${tipe}%0A`;
  if(tipe==="Diantar") pesan += `Alamat: ${alamat}%0A`;
  if(catatan.trim()) pesan += `Catatan: ${catatan}%0A`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${pesan}`, "_blank");
}

function renderVisit(){
  document.getElementById("vAlamat").textContent = ALAMAT;
  document.getElementById("vJam").textContent = JAM_BUKA;
  let links = `<a class="vlink maps" href="${MAPS_URL}" target="_blank">Buka di Maps</a>`;
  links += `<a class="vlink ig" href="${IG_URL}" target="_blank">@${IG_USER}</a>`;
  if(SHOPEE_URL && SHOPEE_URL.trim()){
    links += `<a class="vlink shopee" href="${SHOPEE_URL}" target="_blank">Shopee</a>`;
  }
  document.getElementById("vLinks").innerHTML = links;
}

renderMenu(); renderBar(); renderVisit();
</script>
</body>
